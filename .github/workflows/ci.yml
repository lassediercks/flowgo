name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm install
        run: npm install --no-audit --no-fund
      - name: typecheck
        run: npm run typecheck
      - name: vitest
        run: npm test
      - name: vite build (produces dist/index.html committed alongside source)
        run: npm run build
      - name: dist/index.html is up to date with source
        run: git diff --exit-code -- dist/index.html

  validate:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: npm install
        run: npm install --no-audit --no-fund
      - name: vite build (Go embeds dist/index.html)
        run: npm run build
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (parses + validates map.flowgo)
        run: go test ./...
