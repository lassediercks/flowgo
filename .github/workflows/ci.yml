name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (parses + validates map.flowgo)
        run: go test ./...
